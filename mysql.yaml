- name: mysql
  hosts: mysql
  become: yes
  tasks:
  - name: install mysql 
    ansible.buitin.package: 
      name: mysql-server
      state: present

  - name: start & enable mysql
    ansible.builtin.service:
      state: started
      enabled: yes
  - name: setup root password
    ansible.builtin.shell:  mysql_secure_installation --set-root-pass RoboShop@1       