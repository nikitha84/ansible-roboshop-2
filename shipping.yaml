- name: setup shipping
  hosts: shipping
  become: yes
  tasks:
  - name: install maven
    ansible.builtin.dnf:
      name: "{{ iteam }}"
      state: present
    loop:
    - maven
    - mysql   

  - name: create shipping user
    ansible.builtin.user:
      name: roboshop
      comment: roboshop system shipping
      system: true
      shell: /sbin/nologin

  - name: remove app directory
    ansible.builtin.files:
      state: absent
      path: /app

  - name: create directory
    ansible.builtin.files:
      state: directory
      path: /app  

  - name: delete  application files
    ansible.builtin.files:
      path: /tmp/shipping.zip
      state: absent

  - name: download  application file
    ansible.builtin.get_url:
      url: curl -o /tmp/shipping.zip https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /tmp/shipping.zip

  - name: unzip code
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes 

  - name: install dependecies
    ansible.builtin.commnd: mvn clean package
    arg:
      chdir: /app

  - name: move jar files 
    ansible.builtin.commnd: mv target/shipping-1.0.jar shipping.jar 

  - name: copy shippng service file
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: import shipping data into mysql
    community.mysql.mysql_db:
      state: import
      name: all
      login_host: mysql.nikitha.fun
      login_user: user
      login_password: RoboShop@1
      target:
  - name: daemon reload     
    ansible.builtin.systemd_service:
      name: shipping
      enabled: true
      state: starte
      daemon_reload: true
      target: "{{ iteam }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql
    - /app/db/master-data.sql      
  - name: daemon reload     
    ansible.builtin.systemd_service:
      name: shipping
      enabled: true
      state: started
      daemon_reload: true

