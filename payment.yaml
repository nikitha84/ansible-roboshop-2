- name: payment
  hosts: payment
  become: yes
  tasks:
  - name: install python
    ansible.builtin.dnf:
      name: "{{ iteam }}" 
      state: present
    loop:
    - python3
    - gcc
    - python3-devel

  - name: create system user
    ansible.builtin.user:
      name: roboshop
      comment: roboshop system shipping
      system: true
      shell: /sbin/nologin

  - name: remove app directory
    ansible.builtin.files:
      state: absent
      path: /app

  - name: create directory
    ansible.builtin.files:
      state: directory
      path: /app

  - name: delete  application files
    ansible.builtin.files:
      path: /tmp/payment.zip
      state: absent

  - name: download  application file
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
      dest: /tmp/payment.zip

  - name: unzip code
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes 

  - name: install dependecies
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
      args:
        chdir: /app

  - name: copy payment.service
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service   

  - name: daemon reload     
    ansible.builtin.systemd_service:
      name: payment
      enabled: true
      state: started
      daemon_reload: true    

